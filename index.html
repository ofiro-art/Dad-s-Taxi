<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dad's Taxi 🚕</title>
  <meta property="og:title" content="Dad's Taxi — Ride Request" />
  <meta property="og:description" content="Advanced Bookings Only" />
  <meta property="og:image" content="https://ofiro-art.github.io/Dad-s-Taxi/taxi.jpg" />
  <meta property="og:url" content="https://ofiro-art.github.io/Dad-s-Taxi/" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f13;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: #1a1a22;
      border: 1px solid #2e2e3a;
      border-radius: 20px;
      width: 100%;
      max-width: 480px;
      padding: 36px 32px 32px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }
    .header { text-align: center; margin-bottom: 32px; }
    .taxi-img { width: 220px; height: auto; border-radius: 10px; margin-bottom: 14px; display: block; margin-left: auto; margin-right: auto; }
    .header h1 { font-size: 22px; font-weight: 700; color: #f0f0f5; letter-spacing: -0.3px; }
    .header p { font-size: 13px; color: #6b6b80; margin-top: 4px; }
    .divider { height: 1px; background: #2e2e3a; margin-bottom: 28px; }
    .field { margin-bottom: 18px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #9090a8; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 7px; }
    input, textarea, select {
      width: 100%; background: #111118; border: 1px solid #2e2e3a;
      border-radius: 10px; padding: 11px 14px; font-size: 15px;
      font-family: 'Inter', sans-serif; color: #f0f0f5; outline: none;
      transition: border-color 0.2s; appearance: none; -webkit-appearance: none;
      color-scheme: dark;
    }
    input:focus, textarea:focus, select:focus { border-color: #7c6ef7; }
    input::placeholder, textarea::placeholder { color: #3e3e52; }

    /* Custom date/time icon overlay */
    .input-icon-wrap { position: relative; }
    .input-icon-wrap input[type="date"],
    .input-icon-wrap input[type="time"] { padding-right: 42px; }
    .input-icon-wrap::after {
      content: '📅';
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      font-size: 17px; pointer-events: none; opacity: 0.9;
    }
    .input-icon-wrap.time-icon::after { content: '🕐'; }
    .input-icon-wrap input[type="date"]::-webkit-calendar-picker-indicator,
    .input-icon-wrap input[type="time"]::-webkit-calendar-picker-indicator {
      position: absolute; right: 0; top: 0; width: 100%; height: 100%;
      margin: 0; padding: 0; cursor: pointer; opacity: 0;
    }
    textarea { resize: none; height: 72px; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; background: #111118; border: 1px solid #2e2e3a; border-radius: 10px; padding: 13px 14px; }
    .toggle-label { font-size: 14px; color: #c0c0d8; font-weight: 500; }
    .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #2e2e3a; border-radius: 24px; cursor: pointer; transition: background 0.2s; }
    .slider::before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
    .toggle input:checked + .slider { background: #7c6ef7; }
    .toggle input:checked + .slider::before { transform: translateX(20px); }
    .return-time { margin-top: 12px; display: none; }
    .return-time.visible { display: block; }

    /* Location input with saved places */
    .loc-wrap { position: relative; }
    .loc-input-row { display: flex; gap: 8px; }
    .loc-input-row input { flex: 1; }
    .btn-saved {
      background: #2e2e3a; border: 1px solid #3e3e52; border-radius: 10px;
      color: #9090a8; font-size: 18px; padding: 0 12px; cursor: pointer;
      transition: background 0.2s; white-space: nowrap; flex-shrink: 0;
    }
    .btn-saved:hover { background: #3e3e52; color: #f0f0f5; }
    .saved-dropdown {
      display: none; position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: #1e1e2a; border: 1px solid #3e3e52; border-radius: 12px;
      z-index: 50; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .saved-dropdown.open { display: block; }
    .saved-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 14px; cursor: pointer; transition: background 0.15s;
      border-bottom: 1px solid #2e2e3a;
    }
    .saved-item:last-child { border-bottom: none; }
    .saved-item:hover { background: #2e2e3a; }
    .saved-item-name { font-size: 14px; color: #f0f0f5; font-weight: 600; }
    .saved-item-addr { font-size: 12px; color: #6b6b80; margin-top: 2px; }
    .saved-item-del { color: #ff5555; font-size: 16px; padding: 4px 8px; border-radius: 6px; }
    .saved-item-del:hover { background: rgba(255,85,85,0.15); }
    .no-saved { padding: 14px; font-size: 13px; color: #6b6b80; text-align: center; }

    /* Autocomplete dropdown */
    .autocomplete-list {
      display: none; position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: #1e1e2a; border: 1px solid #3e3e52; border-radius: 12px;
      z-index: 300; max-height: 200px; overflow-y: auto;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .autocomplete-list.open { display: block; }
    .autocomplete-item {
      padding: 10px 14px; cursor: pointer; font-size: 14px; color: #c0c0d8;
      border-bottom: 1px solid #2a2a36; transition: background 0.15s;
    }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover { background: #2e2e3a; color: #f0f0f5; }

    /* Manage Places Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      z-index: 100; align-items: center; justify-content: center; padding: 20px;
      overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1a1a22; border: 1px solid #2e2e3a; border-radius: 20px;
      width: 100%; max-width: 440px; padding: 28px 24px; max-height: 90vh; overflow-y: auto;
      overflow-x: visible; position: relative;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-size: 18px; font-weight: 700; color: #f0f0f5; }
    .modal-close { background: none; border: none; color: #6b6b80; font-size: 22px; cursor: pointer; line-height: 1; }
    .modal-close:hover { color: #f0f0f5; }
    .modal-section-title { font-size: 12px; font-weight: 600; color: #9090a8; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }

    .add-place-form { background: #111118; border: 1px solid #2e2e3a; border-radius: 12px; padding: 16px; margin-bottom: 20px; position: relative; overflow: visible; }
    .add-place-form input { margin-bottom: 10px; }
    .add-place-form input:last-of-type { margin-bottom: 0; }

    .btn-add-place {
      width: 100%; padding: 11px; background: #7c6ef7; border: none; border-radius: 10px;
      color: #fff; font-size: 14px; font-weight: 700; font-family: 'Inter', sans-serif;
      cursor: pointer; margin-top: 10px; transition: opacity 0.2s;
    }
    .btn-add-place:hover { opacity: 0.88; }

    .places-list { display: flex; flex-direction: column; gap: 8px; }
    .place-card {
      background: #111118; border: 1px solid #2e2e3a; border-radius: 10px;
      padding: 12px 14px; display: flex; justify-content: space-between; align-items: center;
    }
    .place-card-name { font-size: 14px; font-weight: 700; color: #f0f0f5; }
    .place-card-addr { font-size: 12px; color: #6b6b80; margin-top: 3px; }
    .place-card-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .place-card-del {
      background: none; border: none; color: #ff5555; font-size: 18px; cursor: pointer;
      padding: 4px 8px; border-radius: 6px; transition: background 0.15s;
    }
    .place-card-del:hover { background: rgba(255,85,85,0.15); }
    .place-card-edit {
      background: none; border: none; color: #9090a8; font-size: 16px; cursor: pointer;
      padding: 4px 8px; border-radius: 6px; transition: background 0.15s, color 0.15s;
    }
    .place-card-edit:hover { background: rgba(124,110,247,0.15); color: #7c6ef7; }
    .place-card.editing { flex-direction: column; align-items: stretch; gap: 8px; }
    .place-edit-form { display: flex; flex-direction: column; gap: 8px; }
    .place-edit-form input { margin-bottom: 0; }
    .place-edit-actions { display: flex; gap: 8px; }
    .btn-edit-save {
      flex: 1; padding: 8px; background: #7c6ef7; border: none; border-radius: 8px;
      color: #fff; font-size: 13px; font-weight: 700; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn-edit-save:hover { opacity: 0.88; }
    .btn-edit-cancel {
      flex: 1; padding: 8px; background: #2e2e3a; border: none; border-radius: 8px;
      color: #9090a8; font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-edit-cancel:hover { background: #3e3e52; color: #f0f0f5; }
    .empty-places { text-align: center; color: #6b6b80; font-size: 13px; padding: 20px; }

    /* Manage places link */
    .manage-places-link {
      text-align: right; margin-bottom: 6px;
    }
    .manage-places-link button {
      background: none; border: none; color: #7c6ef7; font-size: 12px;
      font-family: 'Inter', sans-serif; cursor: pointer; padding: 0;
      text-decoration: underline;
    }

    .btn-share {
      width: 100%; margin-top: 28px; padding: 14px; background: #25D366;
      border: none; border-radius: 12px; font-size: 15px; font-weight: 700;
      font-family: 'Inter', sans-serif; color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-share:hover { opacity: 0.92; }
    .btn-share:active { transform: scale(0.98); }
    .btn-share svg { width: 20px; height: 20px; fill: white; }

    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #2e2e3a; color: #f0f0f5; padding: 10px 20px;
      border-radius: 30px; font-size: 13px; font-weight: 500;
      opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.3s;
      white-space: nowrap; z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .required-star { color: #7c6ef7; margin-left: 2px; }

    /* Tip the Driver chips */
    .tip-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .tip-chip {
      flex: 1 1 calc(50% - 4px); min-width: 0; padding: 11px 12px;
      background: #111118; border: 1px solid #2e2e3a; border-radius: 10px;
      color: #c0c0d8; font-size: 14px; font-weight: 500; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: all 0.15s; text-align: center;
    }
    .tip-chip:hover { border-color: #7c6ef7; color: #f0f0f5; }
    .tip-chip.selected {
      background: #7c6ef7; border-color: #7c6ef7; color: #fff; font-weight: 700;
    }
    .tip-other-field { margin-top: 10px; display: none; }
    .tip-other-field.visible { display: block; }
    @media (max-width: 400px) {
      .card { padding: 28px 20px 24px; }
      .row-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Manage Places Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">📍 Saved Places</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>

    <div class="modal-section-title">Add New Place</div>
    <div class="add-place-form">
      <input type="text" id="newPlaceName" placeholder="Name (e.g. Home, Naomi, School)" />
      <input type="text" id="newPlaceSearch" placeholder="Search address..." oninput="searchAddress(this.value, 'modalAC')" autocomplete="off" />
      <div class="autocomplete-list" id="modalAC"></div>
      <input type="text" id="newPlaceAddr" placeholder="Full address (from search above)" readonly style="color:#7c6ef7;" />
      <button class="btn-add-place" onclick="addPlace()">+ Save Place</button>
    </div>

    <div class="modal-section-title">My Places</div>
    <div class="places-list" id="placesList"></div>
  </div>
</div>

    <h1>Ride Request</h1>
    <p>Fill in the details and share with the family group</p>
  </div>
  <div class="divider"></div>

  <div class="row-2">
    <div class="field">
      <label>Date <span class="required-star">*</span></label>
      <div class="input-icon-wrap"><input type="date" id="date" /></div>
    </div>
    <div class="field">
      <label>Departure Time <span class="required-star">*</span></label>
      <div class="input-icon-wrap time-icon"><input type="time" id="time" /></div>
    </div>
  </div>

  <div class="field">
    <label>Pickup Address <span class="required-star">*</span></label>
    <div class="manage-places-link"><button onclick="openModal()">⚙️ Manage saved places</button></div>
    <div class="loc-wrap" id="fromWrap">
      <div class="loc-input-row">
        <input type="text" id="from" placeholder="Type or pick a saved place..." oninput="searchAddress(this.value, 'fromAC')" autocomplete="off" onfocus="showSaved('fromDrop')" />
        <button class="btn-saved" onclick="toggleSaved('fromDrop')" title="Saved places">📌</button>
      </div>
      <div class="saved-dropdown" id="fromDrop"></div>
      <div class="autocomplete-list" id="fromAC"></div>
    </div>
  </div>

  <div class="field">
    <label>Destination <span class="required-star">*</span></label>
    <div class="loc-wrap" id="toWrap">
      <div class="loc-input-row">
        <input type="text" id="to" placeholder="Type or pick a saved place..." oninput="searchAddress(this.value, 'toAC')" autocomplete="off" onfocus="showSaved('toDrop')" />
        <button class="btn-saved" onclick="toggleSaved('toDrop')" title="Saved places">📌</button>
      </div>
      <div class="saved-dropdown" id="toDrop"></div>
      <div class="autocomplete-list" id="toAC"></div>
    </div>
  </div>

  <div class="field">
    <label>Purpose of Ride</label>
    <textarea id="purpose" placeholder="e.g. Birthday party at Naomi's, shopping..."></textarea>
  </div>

  <div class="field">
    <label>Return Ride Needed?</label>
    <div class="toggle-row">
      <span class="toggle-label">Yes, I need a ride back</span>
      <label class="toggle">
        <input type="checkbox" id="returnToggle" onchange="toggleReturn()" />
        <span class="slider"></span>
      </label>
    </div>
    <div class="return-time" id="returnTimeField">
      <div class="field" style="margin-top:12px; margin-bottom:0;">
        <label>Return Time</label>
        <div class="input-icon-wrap time-icon"><input type="time" id="returnTime" /></div>
      </div>
    </div>
  </div>

  <div class="field">
    <label>Tip the Driver</label>
    <div class="tip-chips">
      <div class="tip-chip" data-tip="Kiss" onclick="selectTip(this)">💋 Kiss</div>
      <div class="tip-chip" data-tip="Hug" onclick="selectTip(this)">🤗 Hug</div>
      <div class="tip-chip" data-tip="Back Scratch" onclick="selectTip(this)">🖐️ Back Scratch</div>
      <div class="tip-chip" data-tip="Other" onclick="selectTip(this)">✏️ Other</div>
    </div>
    <div class="tip-other-field" id="tipOtherField">
      <input type="text" id="tipOther" placeholder="Enter your own tip..." />
    </div>
  </div>

  <button class="btn-share" onclick="submitRequest()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

    Share via WhatsApp
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzJp3XXcX30UaRHP9kZwcCdmlavYNxZtXb-M6HXwirVzjX6nCNaFAMMBQ4ZT1QsWpSf/exec';

  // ── Saved Places (Cloud via Google Script) ───────────────
  let _placesCache = null;

  async function getPlaces() {
    if (_placesCache !== null) return _placesCache;
    try {
      const res = await fetch(SCRIPT_URL + '?action=getPlaces');
      const data = await res.json();
      _placesCache = Array.isArray(data) ? data : [];
    } catch { _placesCache = []; }
    return _placesCache;
  }

  async function savePlaces(arr) {
    _placesCache = arr;
    try {
      await fetch(SCRIPT_URL + '?action=savePlaces&places=' + encodeURIComponent(JSON.stringify(arr)));
    } catch(e) { console.warn('Save places failed:', e); }
  }

  async function openModal() {
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('placesList').innerHTML = '<div class=\"empty-places\">Loading...</div>';
    _placesCache = null;
    await renderPlacesList();
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.getElementById('newPlaceName').value = '';
    document.getElementById('newPlaceSearch').value = '';
    document.getElementById('newPlaceAddr').value = '';
    document.getElementById('modalAC').classList.remove('open');
    document.getElementById('modalAC').innerHTML = '';
  }

  async function renderPlacesList() {
    const places = await getPlaces();
    const el = document.getElementById('placesList');
    if (!places.length) {
      el.innerHTML = '<div class="empty-places">No saved places yet.</div>';
      return;
    }
    el.innerHTML = places.map((p, i) => `
      <div class="place-card" id="place-card-${i}">
        <div style="flex:1;min-width:0;">
          <div class="place-card-name">📌 ${p.name}</div>
          <div class="place-card-addr">${p.address}</div>
        </div>
        <div class="place-card-actions">
          <button class="place-card-edit" onclick="startEditPlace(${i})" title="Edit">✏️</button>
          <button class="place-card-del" onclick="deletePlace(${i})" title="Delete">🗑</button>
        </div>
      </div>
    `).join('');
  }

  async function startEditPlace(i) {
    const places = await getPlaces();
    const p = places[i];
    const card = document.getElementById('place-card-' + i);
    card.classList.add('editing');
    card.innerHTML = `
      <div class="place-edit-form">
        <input type="text" id="edit-name-${i}" value="${p.name.replace(/"/g,'&quot;')}" placeholder="Name" />
        <input type="text" id="edit-addr-${i}" value="${p.address.replace(/"/g,'&quot;')}" placeholder="Address" />
      </div>
      <div class="place-edit-actions">
        <button class="btn-edit-save" onclick="saveEditPlace(${i})">✅ Save</button>
        <button class="btn-edit-cancel" onclick="renderPlacesList()">Cancel</button>
      </div>
    `;
    document.getElementById('edit-name-' + i).focus();
  }

  async function saveEditPlace(i) {
    const name = document.getElementById('edit-name-' + i).value.trim();
    const addr = document.getElementById('edit-addr-' + i).value.trim();
    if (!name || !addr) { showToast('⚠️ Enter both name and address'); return; }
    const places = await getPlaces();
    const duplicate = places.find((p, idx) => idx !== i && p.name.toLowerCase() === name.toLowerCase());
    if (duplicate) { showToast('⚠️ A place with this name already exists'); return; }
    places[i] = { name, address: addr };
    await savePlaces(places);
    showToast('✅ Saving...');
    _placesCache = null;
    await renderPlacesList();
    showToast('✅ Place updated!');
  }

  async function addPlace() {
    const name = document.getElementById('newPlaceName').value.trim();
    const addr = document.getElementById('newPlaceAddr').value.trim();
    if (!name || !addr) { showToast('⚠️ Enter both name and address'); return; }
    const places = await getPlaces();
    if (places.find(p => p.name.toLowerCase() === name.toLowerCase())) {
      showToast('⚠️ A place with this name already exists');
      return;
    }
    places.push({ name, address: addr });
    await savePlaces(places);
    document.getElementById('newPlaceName').value = '';
    document.getElementById('newPlaceSearch').value = '';
    document.getElementById('newPlaceAddr').value = '';
    document.getElementById('modalAC').classList.remove('open');
    _placesCache = null;
    await renderPlacesList();
    showToast('✅ Place saved!');
  }

  async function deletePlace(i) {
    const places = await getPlaces();
    places.splice(i, 1);
    await savePlaces(places);
    _placesCache = null;
    await renderPlacesList();
  }

  // ── Saved dropdown in form ────────────────────────────────
  async function showSaved(dropId) {
    const places = await getPlaces();
    const el = document.getElementById(dropId);
    if (!places.length) { el.innerHTML = '<div class="no-saved">No saved places. Use ⚙️ to add.</div>'; }
    else {
      el.innerHTML = places.map(p => `
        <div class="saved-item" onclick="selectSaved('${dropId}', '${p.name.replace(/'/g, "\\'")}')">
          <div>
            <div class="saved-item-name">📌 ${p.name}</div>
            <div class="saved-item-addr">${p.address}</div>
          </div>
        </div>
      `).join('');
    }
    el.classList.add('open');
  }

  async function toggleSaved(dropId) {
    const el = document.getElementById(dropId);
    if (el.classList.contains('open')) { el.classList.remove('open'); }
    else { await showSaved(dropId); }
  }

  function selectSaved(dropId, name) {
    const inputId = dropId === 'fromDrop' ? 'from' : 'to';
    document.getElementById(inputId).value = name;
    document.getElementById(dropId).classList.remove('open');
  }

  // ── Address autocomplete ──────────────────────────────────
  let acTimers = {};

  function isSgPostal(q) { return /^\d{6}$/.test(q.trim()); }
  function isIlPostal(q) { return /^\d{7}$/.test(q.trim()); }

  function formatNominatim(d) {
    const a = d.address || {};
    const parts = [
      a.house_number || '',
      a.road || a.pedestrian || a.path || a.amenity || '',
      a.suburb || a.neighbourhood || '',
      a.city || a.town || a.village || '',
      a.postcode || '',
      a.country || ''
    ].filter(Boolean);
    return parts.join(', ') || d.display_name;
  }

  function renderAC(el, items) {
    if (!items.length) { el.classList.remove('open'); return; }
    el.innerHTML = items.map(({ label, value }) =>
      `<div class="autocomplete-item" onclick="selectAddress('${el.id}', '${value.replace(/'/g, "\\'")}')">
        ${label}
      </div>`
    ).join('');
    el.classList.add('open');
  }

  async function searchAddress(query, acId) {
    clearTimeout(acTimers[acId]);
    const el = document.getElementById(acId);
    if (!query || query.length < 3) { el.classList.remove('open'); return; }

    acTimers[acId] = setTimeout(async () => {
      try {
        // ── Singapore postal code → OneMap (official SG government API) ──
        if (isSgPostal(query)) {
          const res = await fetch(
            `https://www.onemap.gov.sg/api/common/elastic/search?searchVal=${encodeURIComponent(query)}&returnGeom=N&getAddrDetails=Y&pageNum=1`
          );
          const data = await res.json();
          const results = (data.results || []).slice(0, 5);
          if (results.length) {
            renderAC(el, results.map(r => {
              const label = `${r.BLK_NO} ${r.ROAD_NAME}, ${r.BUILDING !== 'NIL' ? r.BUILDING + ', ' : ''}Singapore ${r.POSTAL}`;
              return { label, value: label };
            }));
            return;
          }
        }

        // ── Israel postal code → Nominatim ───────────────────────────────
        if (isIlPostal(query)) {
          const res = await fetch(
            `https://nominatim.openstreetmap.org/search?postalcode=${encodeURIComponent(query)}&countrycodes=il&format=json&addressdetails=1&limit=5`,
            { headers: { 'Accept-Language': 'en' } }
          );
          const data = await res.json();
          if (data.length) {
            renderAC(el, data.map(d => ({ label: formatNominatim(d), value: formatNominatim(d) })));
            return;
          }
        }

        // ── Free-text: OneMap for SG names, then Nominatim SG+IL ─────────
        const [omRes, nomRes] = await Promise.all([
          fetch(`https://www.onemap.gov.sg/api/common/elastic/search?searchVal=${encodeURIComponent(query)}&returnGeom=N&getAddrDetails=Y&pageNum=1`),
          fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&addressdetails=1&limit=5&countrycodes=sg,il`,
            { headers: { 'Accept-Language': 'en' } })
        ]);
        const omData = await omRes.json();
        const nomData = await nomRes.json();

        const items = [];

        // OneMap results first
        (omData.results || []).slice(0, 3).forEach(r => {
          const label = `${r.BLK_NO} ${r.ROAD_NAME}, ${r.BUILDING !== 'NIL' ? r.BUILDING + ', ' : ''}Singapore ${r.POSTAL}`;
          items.push({ label, value: label });
        });

        // Nominatim results (Israel & anything else)
        nomData.slice(0, 4).forEach(d => {
          const label = formatNominatim(d);
          if (!items.find(i => i.label === label)) items.push({ label, value: label });
        });

        if (!items.length) {
          // Global fallback
          const globalRes = await fetch(
            `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&addressdetails=1&limit=5`,
            { headers: { 'Accept-Language': 'en' } }
          );
          const globalData = await globalRes.json();
          globalData.forEach(d => items.push({ label: formatNominatim(d), value: formatNominatim(d) }));
        }

        renderAC(el, items);
      } catch(e) { el.classList.remove('open'); }
    }, 400);
  }

  function selectAddress(acId, address) {
    const el = document.getElementById(acId);
    el.classList.remove('open');
    if (acId === 'fromAC') {
      document.getElementById('from').value = address;
    } else if (acId === 'toAC') {
      document.getElementById('to').value = address;
    } else if (acId === 'modalAC') {
      document.getElementById('newPlaceSearch').value = address;
      document.getElementById('newPlaceAddr').value = address;
    }
  }

  // Close dropdowns on outside click
  document.addEventListener('click', (e) => {
    ['fromDrop','toDrop','fromAC','toAC'].forEach(id => {
      const el = document.getElementById(id);
      if (!el.closest('.loc-wrap')?.contains(e.target)) el.classList.remove('open');
    });
  });

  // ── Form logic ────────────────────────────────────────────
  function toggleReturn() {
    const checked = document.getElementById('returnToggle').checked;
    document.getElementById('returnTimeField').classList.toggle('visible', checked);
  }

  function selectTip(el) {
    document.querySelectorAll('.tip-chip').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    const isOther = el.dataset.tip === 'Other';
    document.getElementById('tipOtherField').classList.toggle('visible', isOther);
    if (isOther) document.getElementById('tipOther').focus();
  }

  function getTipValue() {
    const selected = document.querySelector('.tip-chip.selected');
    if (!selected) return '';
    if (selected.dataset.tip === 'Other') {
      return document.getElementById('tipOther').value.trim();
    }
    return selected.dataset.tip;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function formatDate(val) {
    if (!val) return '';
    const [y, m, d] = val.split('-');
    return `${d}/${m}/${y}`;
  }

  async function submitRequest() {
    const date       = document.getElementById('date').value;
    const time       = document.getElementById('time').value;
    const from       = document.getElementById('from').value.trim();
    const to         = document.getElementById('to').value.trim();
    const purpose    = document.getElementById('purpose').value.trim();
    const needReturn = document.getElementById('returnToggle').checked;
    const returnTime = document.getElementById('returnTime').value;
    const tip        = getTipValue();

    if (!date || !time || !from || !to) { showToast('⚠️ Please fill in all required fields'); return; }
    if (needReturn && !returnTime) { showToast('⚠️ Please enter the return time'); return; }

    showToast('📋 Saving to log...');
    try {
      const formData = new FormData();
      formData.append('date', date);
      formData.append('time', time);
      formData.append('from', from);
      formData.append('to', to);
      formData.append('purpose', purpose);
      formData.append('needReturn', needReturn ? 'Yes' : 'No');
      formData.append('returnTime', returnTime);
      formData.append('tip', tip);
      await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: formData });
    } catch(e) { console.warn('Sheets log failed:', e); }

    let msg = `🚗 *Ride Request*\n\n`;
    msg += `📅 *Date:* ${formatDate(date)}\n`;
    msg += `⏰ *Departure:* ${time}\n`;
    msg += `📍 *From:* ${from}\n`;
    msg += `🏁 *To:* ${to}\n`;
    if (purpose) msg += `🎯 *Purpose:* ${purpose}\n`;
    msg += needReturn ? `\n↩️ *Return ride:* Yes, at ${returnTime}\n` : `\n↩️ *Return ride:* No\n`;
    if (tip) msg += `🎁 *Tip for driver:* ${tip}\n`;
    msg += `\n_Please confirm ✅_`;

    showToast('✅ Saved! Opening WhatsApp...');
    setTimeout(() => {
      if (navigator.share) { navigator.share({ text: msg }).catch(() => {}); }
      else { window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank'); }
    }, 800);
  }
</script>
